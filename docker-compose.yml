version: '3.8'

services:
  kino-ua:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - kino-network

  # PostgreSQL (для майбутнього використання)
